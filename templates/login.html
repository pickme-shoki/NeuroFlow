<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>NeuroFlow | Login</title>
</head>
<body class="login-page">
    <div class="card" style="max-width: 400px; margin: 80px auto; text-align: center;">
        <h2>NeuroFlow Portal 🧠</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" style="width: 100%;">Login</button>
        </form>
        {% with messages = get_flashed_messages() %}{% if messages %}<p style="color: red;">{{ messages[0] }}</p>{% endif %}{% endwith %}
    </div>
</body>
</html>
